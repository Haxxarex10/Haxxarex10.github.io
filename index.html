<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universe Webs</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <style>
        body {
            background: linear-gradient(to right, #1a1a1a, #0d0d0d);
            color: #fff;
            font-family: Arial, sans-serif;
        }
        .custom-cursor {
            position: fixed;
            pointer-events: none;
            width: 20px;
            height: 20px;
            background: #f00;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        .service-card {
            width: 200px;
            background-color: #333;
            border: 1px solid #444;
            border-radius: 10px;
            padding: 20px;
            margin: 10px;
            transition: transform 0.3s;
        }
        .service-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        .team member {
            display: inline-block;
            transition: transform 0.3s;
        }
        .team-member:hover {
            transform: rotateY(10deg);
        }
    </style>
</head>
<body>
    <div class="custom-cursor"></div>
    <h1>Welcome to Universe Webs</h1>
    <div class="services">
        <div class="service-card">YouTube<br>Price: $100<br><button>Info</button></div>
        <div class="service-card">Instagram<br>Price: $90<br><button>Info</button></div>
        <div class="service-card">Facebook<br>Price: $70<br><button>Info</button></div>
        <div class="service-card">Snapchat<br>Price: $60<br><button>Info</button></div>
        <div class="service-card">WhatsApp<br>Price: $50<br><button>Info</button></div>
        <div class="service-card">X<br>Price: $40<br><button>Info</button></div>
        <div class="service-card">OnlyFans<br>Price: $150<br><button>Info</button></div>
        <div class="service-card">Telegram<br>Price: $30<br><button>Info</button></div>
    </div>
    <div class="team">
        <div class="team-member">ALEX REX</div>
        <div class="team-member">FALLEN</div>
    </div>
    <script>
        document.addEventListener('mousemove', (e) => {
            const cursor = document.querySelector('.custom-cursor');
            cursor.style.left = `${e.pageX}px`;
            cursor.style.top = `${e.pageY}px`;
        });
        // GSAP animations and sound effects to be added here
    </script>
</body>
</html>
